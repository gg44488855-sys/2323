<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ماش ماش</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0) !important;
    overflow: hidden;
}

.container {
    position: fixed;
    inset: 0;
    background: transparent !important;
}

.text {
    position: absolute;
    color: white;
    font-family: Arial Black, sans-serif;
    font-weight: 900;
    white-space: nowrap;
    text-transform: uppercase;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    user-select: none;
    pointer-events: none;
    animation: float 4s ease-in-out infinite alternate;
}

@keyframes float {
    from { transform: translate(0, 0); }
    to { transform: translate(6px, 10px); }
}
</style>
</head>

<body>

<!-- 🔊 الصوت -->
<audio id="bgMusic" autoplay loop>
    <source src="For Ems.mp3" type="audio/mpeg">
</audio>

<div class="container" id="container"></div>

<script>
const container = document.getElementById("container");

// تشغيل الصوت (بعض المتصفحات تمنع autoplay بدون تفاعل)
window.addEventListener("click", () => {
    document.getElementById("bgMusic").play();
});

// النصوص
const rows = 12;
const cols = 8;

function createOverlay() {
    container.innerHTML = '';

    const cellWidth = 100 / cols;
    const cellHeight = 100 / rows;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {

            const text = document.createElement("div");
            text.className = "text";
            text.innerText = "وش رايك تروح تنام؟";

            const x = (c * cellWidth) + (Math.random() * (cellWidth * 0.6));
            const y = (r * cellHeight) + (Math.random() * (cellHeight * 0.6));

            text.style.left = x + "vw";
            text.style.top = y + "vh";

            const size = Math.floor(Math.random() * 25) + 25;
            text.style.fontSize = size + "px";

            text.style.opacity = Math.random() * 0.5 + 0.5;

            text.style.animationDelay = (Math.random() * 4) + "s";

            container.appendChild(text);
        }
    }
}

createOverlay();
window.addEventListener("resize", createOverlay);
</script>

</body>
</html>
